<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Heatmap — Black Sea Water Temperature</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="icon" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <a class="nav-brand" href="index.html">🌊 Black Sea Temp</a>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="compare.html">Compare Years</a></li>
            <li><a href="heatmap.html" class="active">Heatmap</a></li>
            <li><a href="stats.html">Statistics</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h1>Monthly Heatmap</h1>
    <p class="subtitle">Average water temperature per month across all years (2000–present)</p>

    <div id="heatmap-chart" class="chart-tall"></div>

    <h2>Monthly Averages by Year</h2>
    <p class="tip">Each cell shows the mean temperature for that month/year. Hover for exact values.</p>
    <div id="monthly-avg-chart" class="chart"></div>
</div>

<script src="data.js"></script>
<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

loadData().then(records => {
    const minYear = records[0].year;
    const maxYear = records[records.length - 1].year;
    const years = [];
    for (let y = minYear; y <= maxYear; y++) years.push(y);

    // Build month×year average matrix
    const matrix = years.map(y =>
        MONTHS.map((_, mi) => {
            const m = mi + 1;
            const recs = records.filter(r => r.year === y && r.month === m);
            if (recs.length === 0) return null;
            return parseFloat((recs.reduce((s, r) => s + r.temp, 0) / recs.length).toFixed(1));
        })
    );

    const theme = plotlyTheme();

    // Heatmap: years on Y axis (latest on top), months on X
    Plotly.newPlot('heatmap-chart', [{
        z: [...matrix].reverse(),
        x: MONTHS,
        y: [...years].reverse().map(String),
        type: 'heatmap',
        colorscale: 'RdBu',
        reversescale: false,
        zmin: 5, zmax: 28,
        colorbar: { title: '°C', thickness: 14 },
        hovertemplate: '<b>%{y} %{x}</b>: %{z:.1f}°C<extra></extra>'
    }], {
        ...theme,
        xaxis: { ...theme.xaxis, title: '' },
        yaxis: { ...theme.yaxis, title: '', dtick: 5 },
        margin: { l: 55, r: 80, t: 30, b: 40 }
    }, { responsive: true });

    // Second chart: line per month showing avg over years
    const monthTraces = MONTHS.map((name, mi) => {
        const m = mi + 1;
        return {
            x: years.map(String),
            y: years.map(y => {
                const recs = records.filter(r => r.year === y && r.month === m);
                return recs.length ? parseFloat((recs.reduce((s,r) => s + r.temp, 0) / recs.length).toFixed(1)) : null;
            }),
            name,
            type: 'scatter', mode: 'lines',
            connectgaps: true,
            hovertemplate: `<b>${name}</b> %{x}: %{y:.1f}°C<extra></extra>`
        };
    });

    Plotly.newPlot('monthly-avg-chart', monthTraces, {
        ...theme,
        xaxis: { ...theme.xaxis, title: '' },
        yaxis: { ...theme.yaxis, title: '°C' },
        hovermode: 'x unified',
        legend: { orientation: 'h', y: -0.2 }
    }, { responsive: true });
});
</script>
</body>
</html>
