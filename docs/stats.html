<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics — Black Sea Water Temperature</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="icon" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <a class="nav-brand" href="index.html">🌊 Black Sea Temp</a>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="compare.html">Compare Years</a></li>
            <li><a href="heatmap.html">Heatmap</a></li>
            <li><a href="stats.html" class="active">Statistics</a></li>
        </ul>
    </div>
</nav>

<div class="container">
    <h1>Statistics &amp; Records</h1>
    <p class="subtitle">All-time records and annual statistics since 2000</p>

    <h2>All-time Records</h2>
    <div id="records-grid" class="records-grid"></div>

    <h2>Annual Min / Avg / Max</h2>
    <div id="annual-chart" class="chart"></div>

    <h2>Long-term Trend</h2>
    <p class="tip">Yearly average with a 5-year moving average trend line.</p>
    <div id="trend-chart" class="chart"></div>
</div>

<script src="data.js"></script>
<script>
function movingAvg(arr, n) {
    return arr.map((_, i) => {
        const slice = arr.slice(Math.max(0, i - Math.floor(n/2)), Math.min(arr.length, i + Math.ceil(n/2)));
        const valid = slice.filter(v => v !== null);
        return valid.length ? parseFloat((valid.reduce((a,b) => a+b,0) / valid.length).toFixed(2)) : null;
    });
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(date) {
    return `${MONTH_NAMES[date.month - 1]} ${date.day}, ${date.year}`;
}

loadData().then(records => {
    const minYear = records[0].year;
    const maxYear = records[records.length - 1].year;
    const years = [];
    for (let y = minYear; y <= maxYear; y++) years.push(y);

    // All-time records
    const hotRecord  = records.reduce((a, b) => b.temp > a.temp ? b : a);
    const coldRecord = records.reduce((a, b) => b.temp < a.temp ? b : a);

    // Yearly stats
    const yMin = [], yMax = [], yAvg = [];
    years.forEach(y => {
        const recs = records.filter(r => r.year === y);
        if (!recs.length) { yMin.push(null); yMax.push(null); yAvg.push(null); return; }
        yMin.push(parseFloat(Math.min(...recs.map(r => r.temp)).toFixed(1)));
        yMax.push(parseFloat(Math.max(...recs.map(r => r.temp)).toFixed(1)));
        yAvg.push(parseFloat((recs.reduce((s,r) => s+r.temp,0) / recs.length).toFixed(2)));
    });

    // Warmest / coldest year by average
    let warmestYear = years[0], coldestYear = years[0];
    years.forEach((y, i) => {
        if (yAvg[i] !== null) {
            if (yAvg[i] > yAvg[years.indexOf(warmestYear)]) warmestYear = y;
            if (yAvg[i] < yAvg[years.indexOf(coldestYear)]) coldestYear = y;
        }
    });
    const warmestAvg = yAvg[years.indexOf(warmestYear)];
    const coldestAvg = yAvg[years.indexOf(coldestYear)];

    // Records grid
    const grid = document.getElementById('records-grid');
    grid.innerHTML = `
        <div class="record-card hot">
            <span class="label">Hottest reading</span>
            <span class="record-value">${hotRecord.temp}°C</span>
            <span class="record-date">${fmt(hotRecord)}</span>
        </div>
        <div class="record-card cold">
            <span class="label">Coldest reading</span>
            <span class="record-value">${coldRecord.temp}°C</span>
            <span class="record-date">${fmt(coldRecord)}</span>
        </div>
        <div class="record-card hot">
            <span class="label">Warmest year (avg)</span>
            <span class="record-value">${warmestAvg}°C</span>
            <span class="record-date">${warmestYear}</span>
        </div>
        <div class="record-card cold">
            <span class="label">Coldest year (avg)</span>
            <span class="record-value">${coldestAvg}°C</span>
            <span class="record-date">${coldestYear}</span>
        </div>
    `;

    const theme = plotlyTheme();
    const yrStr = years.map(String);

    // Annual min/avg/max chart
    Plotly.newPlot('annual-chart', [
        {
            x: yrStr, y: yMax, name: 'Max',
            type: 'scatter', mode: 'lines+markers',
            line: { color: '#e05030' }, marker: { size: 5 },
            hovertemplate: 'Max %{x}: <b>%{y:.1f}°C</b><extra></extra>'
        },
        {
            x: yrStr, y: yAvg, name: 'Avg',
            type: 'scatter', mode: 'lines+markers',
            line: { color: '#007bff' }, marker: { size: 5 },
            hovertemplate: 'Avg %{x}: <b>%{y:.1f}°C</b><extra></extra>'
        },
        {
            x: yrStr, y: yMin, name: 'Min',
            type: 'scatter', mode: 'lines+markers',
            line: { color: '#4da6ff' }, marker: { size: 5 },
            hovertemplate: 'Min %{x}: <b>%{y:.1f}°C</b><extra></extra>'
        }
    ], {
        ...theme,
        xaxis: { ...theme.xaxis, title: '' },
        yaxis: { ...theme.yaxis, title: '°C' },
        hovermode: 'x unified',
        legend: { orientation: 'h', y: -0.2 }
    }, { responsive: true });

    // Trend chart: yearly avg + 5-year moving average
    yAvg[yAvg.length - 1] = null;
    const trend = movingAvg(yAvg, 5);
    Plotly.newPlot('trend-chart', [
        {
            x: yrStr, y: yAvg, name: 'Yearly avg',
            type: 'scatter', mode: 'lines+markers',
            line: { color: '#007bff', width: 1 }, marker: { size: 4 }, opacity: 0.6,
            hovertemplate: '%{x}: <b>%{y:.2f}°C</b><extra></extra>'
        },
        {
            x: yrStr, y: trend, name: '5-yr trend',
            type: 'scatter', mode: 'lines',
            line: { color: '#e05030', width: 2.5 },
            hovertemplate: '5-yr avg %{x}: <b>%{y:.2f}°C</b><extra></extra>'
        }
    ], {
        ...theme,
        xaxis: { ...theme.xaxis, title: '' },
        yaxis: { ...theme.yaxis, title: '°C' },
        hovermode: 'x unified',
        legend: { orientation: 'h', y: -0.2 }
    }, { responsive: true });
});
</script>
</body>
</html>
