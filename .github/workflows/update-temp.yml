name: Update sea water temperature

on:
  schedule:
    - cron: "0 */2 * * *"  # every 2 hours (UTC)
  workflow_dispatch:        # allow manual runs

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect temperature data
        run: python3 get_daily_temp.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sea_water_temp.csv sinemorets_water_temp.csv
          git diff --staged --quiet || (git commit -m "daily temp update" && git push)
